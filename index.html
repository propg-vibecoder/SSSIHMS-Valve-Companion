<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SSSIHMS Heart Buddy - Language Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#faf9f6",
                        "surface-dim": "#d9dbd6",
                        "on-surface": "#303330",
                        "tertiary-dim": "#4c554d",
                        "surface-tint": "#4b6552",
                        "secondary": "#3d6668",
                        "outline": "#797b78",
                        "on-tertiary": "#f2fcf0",
                        "tertiary-container": "#e7f1e5",
                        "error-dim": "#67040d",
                        "error-container": "#fa746f",
                        "on-tertiary-fixed-variant": "#5b655c",
                        "on-error": "#fff7f6",
                        "primary-fixed-dim": "#bedcc4",
                        "on-secondary": "#e3feff",
                        "surface-variant": "#e1e3de",
                        "on-tertiary-fixed": "#3f4941",
                        "surface-container-high": "#e7e9e4",
                        "on-primary-container": "#3e5845",
                        "secondary-container": "#c0eaec",
                        "on-error-container": "#6e0a12",
                        "on-secondary-fixed-variant": "#3a6264",
                        "primary-container": "#ccead1",
                        "surface-container-highest": "#e1e3de",
                        "surface-container": "#eeeeea",
                        "tertiary-fixed": "#e7f1e5",
                        "on-background": "#303330",
                        "inverse-surface": "#0d0f0d",
                        "surface-container-low": "#f4f4f0",
                        "on-primary-fixed": "#2c4533",
                        "tertiary": "#586159",
                        "surface-bright": "#faf9f6",
                        "on-tertiary-container": "#515b52",
                        "on-secondary-container": "#30585a",
                        "secondary-dim": "#31595b",
                        "on-surface-variant": "#5d605c",
                        "inverse-primary": "#daf8df",
                        "primary-dim": "#3f5946",
                        "secondary-fixed-dim": "#b2dcde",
                        "primary": "#4b6552",
                        "inverse-on-surface": "#9d9d9a",
                        "secondary-fixed": "#c0eaec",
                        "primary-fixed": "#ccead1",
                        "on-primary": "#e7ffea",
                        "tertiary-fixed-dim": "#d8e2d7",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#47614e",
                        "surface": "#faf9f6",
                        "on-secondary-fixed": "#1c4547",
                        "outline-variant": "#b0b3ae",
                        "error": "#a83836"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #faf9f6;
            min-height: max(884px, 100dvh);
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .sage-gradient {
            background: linear-gradient(135deg, #4b6552 0%, #3f5946 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 32px 64px -12px rgba(48, 51, 48, 0.06);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar Mapping -->
<header class="fixed top-0 w-full z-50 bg-stone-50/70 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border border-primary-container">
<img alt="SSSIHMS Logo" class="w-full h-full object-contain" src="screen.png"/>
</div>
<span class="text-lg font-bold text-emerald-900 font-plus-jakarta-sans tracking-tight">SSSIHMS, Prasanthigram</span>
</div>
<div class="flex items-center gap-4">
<button class="text-emerald-800 hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl" data-icon="volume_up">volume_up</span>
</button>
</div>
</header>
<main class="mt-24 px-6 pb-48 max-w-md w-full flex flex-col">
<!-- Hero Section -->
<div class="relative w-full rounded-2xl overflow-hidden mb-8 aspect-[4/3] soft-shadow">
<img alt="SSSIHMS Hospital Building" class="w-full h-full object-cover" src="hospital.JPG"/>
<div class="absolute inset-0 bg-black/40"></div>
<div class="absolute bottom-6 left-6 right-6">
<h1 class="text-3xl font-extrabold text-white tracking-tight leading-tight mb-2">SSSIHMS Heart Companion</h1>
<p class="text-white text-base leading-relaxed opacity-90">Choose your language to begin your recovery journey with compassion and care.</p>
</div>
</div>
<!-- Voice Instructions Card -->
<div class="bg-primary-container/30 rounded-2xl p-6 mb-8 flex items-center gap-4 border border-outline-variant/15 active:scale-95 transition-transform duration-200 cursor-pointer">
<div class="w-14 h-14 rounded-full sage-gradient flex items-center justify-center text-on-primary shadow-lg">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</div>
<div>
<h3 class="font-bold text-on-primary-container text-lg leading-none mb-1">Hear Instructions</h3>
<p class="text-on-primary-fixed-variant text-sm">Click here to listen to the welcome guide</p>
</div>
</div>
<!-- Language Grid -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">English</span>
<span class="text-on-surface-variant text-xs font-medium">English</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">हिंदी</span>
<span class="text-on-surface-variant text-xs font-medium">Hindi</span>
</button>
<button class="bg-primary-container/90 p-5 rounded-2xl soft-shadow border border-primary/40 text-left ring-4 ring-primary/30 ring-offset-2 ring-offset-background transition-all duration-200">
<span class="block text-primary font-bold text-lg mb-0.5">తెలుగు</span>
<span class="text-on-primary-container text-xs font-medium">Telugu</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">தமிழ்</span>
<span class="text-on-surface-variant text-xs font-medium">Tamil</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">ಕನ್ನಡ</span>
<span class="text-on-surface-variant text-xs font-medium">Kannada</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">മലയാളം</span>
<span class="text-on-surface-variant text-xs font-medium">Malayalam</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">বাংলা</span>
<span class="text-on-surface-variant text-xs font-medium">Bengali</span>
</button>
<button class="bg-surface-container-lowest p-5 rounded-2xl soft-shadow border border-outline-variant/10 text-left hover:bg-primary-container/40 transition-colors group">
<span class="block text-primary font-bold text-lg mb-0.5 group-hover:scale-105 transition-transform origin-left">मराठी</span>
<span class="text-on-surface-variant text-xs font-medium">Marathi</span>
</button>
</div><p class="mt-4 text-center text-xs text-on-surface-variant/80 px-4 italic leading-tight">Note: Language selection will update all content across the app in the final version.</p>
<div class="h-12"></div>
</main>
<!-- Navigation & Action Area -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Continue Button -->
<div class="px-6 pb-4">
<button class="w-full h-14 sage-gradient text-on-primary rounded-full font-headline font-bold text-lg shadow-xl active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="glass-panel border-t border-outline-variant/10 flex justify-around items-center py-3 px-2">
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="fitness_center">fitness_center</span>
<span class="text-[10px] font-bold text-on-surface-variant">Activity</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="favorite">favorite</span>
<span class="text-[10px] font-bold text-on-surface-variant">Care</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="restaurant">restaurant</span>
<span class="text-[10px] font-bold text-on-surface-variant">Diet</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform" data-icon="security">security</span>
<span class="text-[10px] font-bold text-on-surface-variant">Safety</span>
</button>
</nav>
</div>
</body></html>
